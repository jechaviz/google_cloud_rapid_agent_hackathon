name: Deploy Cloud Run

on:
  workflow_dispatch:
    inputs:
      region:
        description: Google Cloud region
        required: true
        default: us-central1
      service:
        description: Cloud Run service name
        required: true
        default: aegisops-incident-agent

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy
        run: |
          gcloud run deploy "${{ inputs.service }}" \
            --source . \
            --region "${{ inputs.region }}" \
            --allow-unauthenticated \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},GOOGLE_CLOUD_LOCATION=${{ inputs.region }},AGENT_ENV=prod" \
            --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest,DYNATRACE_MCP_TOKEN=DYNATRACE_MCP_TOKEN:latest,DYNATRACE_MCP_URL=DYNATRACE_MCP_URL:latest"
